<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height: 100px;
            width: 100px;
            border: 3px solid black;
            margin-right:5px;
             text-align: center;
               flex-grow: 2;
        }
        #container{
            height: 300px;
            width:600px;
            padding:10px;
            margin:20px;
            border:3px solid black;
            display: grid;
            grid-template-columns: 100px 10px;
            grid-template-rows: 100px 100px;
        
           
        }
        #box1{
            background-color: pink;
            grid-row: 1/2;
            grid-column: 1/2;
       }
        #box2{background-color: yellow;
            grid-column: 2/2;
            grid-row: 1/2;
        }
        #box3{background-color: red;
             grid-column:1/2;
            grid-row: 2/2;
             }
        #box4{background-color: green;
             grid-column: 2/2;
            grid-row: 2/2;
}
            @media screen and (min-width:250px){
                .box{
                    border:5px solid burlywood;
                }
            }
</style>

</head>
<body>
    <div id="container">
        <div id="box1" class="box">Flex item 1</div>
        <div id="box2" class="box">Flex item 2</div>
        <div id="box3" class="box">Flex item 3</div>
        <div id="box4" class="box">Flex item 4</div>
    </div>
    
</body>
</html>
