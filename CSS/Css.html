<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Practice</title>

    <!-- Google Icon -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">

    <style>
        body {
            background-color: #111;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        /* Heading */
        h1 {
            color: red;
            background-color: black;
            padding: 10px;
        }

        /* First Div */
        #heading {
            color: yellow;
            background-color: red;
            height: 60px;
            width: 150px;
            margin: 20px auto;
            line-height: 60px;
            border-radius: 10px;

            background-image: url(img.jfif);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: right;
        }

        /* Second Div */
        #second-div {
            color: aqua;
            background-color: blueviolet;
            padding: 15px;
            margin: 20px;
            border-radius: 10px;
        }

        /* Paragraph */
        p {
            color: burlywood;
            background-color: rgb(19, 142, 10);
            line-height: 1.8;
            font-size: large;
            font-weight: bold;
            font-style: oblique;
            padding: 15px;
            margin: 20px;
            border-radius: 10px;
        }

        /* Special Heading */
        .sph {
            background-color: rgba(70, 34, 23, 0.3);
            color: #AAFFCC;
            padding: 10px;
            margin: 20px;
            border-radius: 10px;
        }

        /* Box */
        #box {
            color: red;
            background-color: yellow;
            text-align: center;
            text-decoration: overline double blue;
            height: 100px;
            width: 100px;
            line-height: 100px;
            margin: 20px auto;

            border: 3px dashed black;
            border-radius: 15px;

            box-shadow: 0 0 10px white;
        }

        /* Button */
        #btn {
            padding: 10px 20px;
            margin: 20px;
            border: 2px dotted red;
            border-radius: 37px;
            background-color: black;
            color: white;
            cursor: pointer;
            height:60px;
            width:60px;
           
        }

        #btn:hover {
            background-color: red;
            color: black;
        }

        /* Icon */
        span {
            font-size: 40px;
            margin-top: 20px;
            display: block;
        }
    </style>
</head>

<body>

    <span class="material-symbols-outlined">home</span>

    <h1>This is my first Heading</h1>

    <div id="heading">First Div</div>

    <div id="second-div">Second Div</div>

    <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit.
        In quo harum quos eos, at alias adipisci repudiandae sequi
        nisi laborum, similique veniam.
    </p>

    <h2 class="sph">Heading 2</h2>

    <div id="box">Box</div>

    <button id="btn">Click Me!</button>

</body>
</html>
