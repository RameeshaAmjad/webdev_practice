<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height: 100px;
            width: 100px;
            border: 3px solid black;
            margin-right:5px;
             text-align: center;
               flex-grow: 2;
        }
        #container{
            height: 150px;
            width:600px;
            padding:10px;
            margin:20px;
            border:3px solid black;
            display: flex;
            flex-direction: row-reverse;
            justify-content:center;
            align-items: center;
            align-content: center;
           
        }
        #box1{background-color: pink;
            order:3;
       }
        #box2{background-color: yellow;
        order:1}
        #box3{background-color: red;
             flex-grow: 2;
             order: 4;
        align-self:flex-end;
    flex-shrink: 5;}
        #box4{background-color: green;
        order: 2;}
</style>
</head>
<body>
    <div id="container">
        <div id="box1" class="box">Flex item 1</div>
        <div id="box2" class="box">Flex item 2</div>
        <div id="box3" class="box">Flex item 3</div>
        <div id="box4" class="box">Flex item 4</div>
    </div>
    
</body>
</html>
